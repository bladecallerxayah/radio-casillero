<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rádio Casillero</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="stage">
  <img class="artboard" src="assets/layout.png" />

  <div class="overlay">

    <a id="heartBtn" class="hotspot" target="_blank">
      <img src="assets/heart.png"/>
    </a>

    <button id="playBtn" class="hotspot">
      <img id="playIcon" src="assets/play.png"/>
    </button>

    <button id="volumeBtn" class="hotspot">
      <img id="volumeIcon" src="assets/volume.png"/>
    </button>

    <div id="volumePanel" class="volume-panel">
      <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.7"/>
    </div>

  </div>
</div>

<!-- player escondido -->
<div id="yt-player"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>

</body>
</html>
